name: Build Linux AppImage for x86_64

on:
  push:
    branches: 
      - 2.3.1_devloper
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    # 使用 Ubuntu 24.04 匹配服务器环境
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Free up disk space
      shell: bash -e {0}
      run: |
        echo "=== Before cleanup ==="
        df -h /
        
        # 删除不需要的软件和镜像
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        
        # 清理 apt 缓存
        sudo apt-get clean
        
        echo ""
        echo "=== After cleanup ==="
        df -h /
    
    - name: Setup build info
      shell: bash -e {0}
      run: |
        echo "Building for Ubuntu 24.04 x86_64"
        echo "CPU cores: $(nproc)"
        echo "Available memory: $(free -h | grep Mem | awk '{print $2}')"
        uname -a
        cat /etc/os-release
    
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-24.04-ccache
        max-size: 2G
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          deps/build
          deps/DL_CACHE
        key: ${{ runner.os }}-24.04-deps-${{ hashFiles('deps/CMakeLists.txt', 'deps/**/*.cmake', 'deps/**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-24.04-deps-
          ${{ runner.os }}-deps-
    
    - name: Fix package manager state
      shell: bash -e {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-broken
        sudo apt-get install -y libunwind-dev
    
    - name: Install system dependencies
      shell: bash -e {0}
      run: |
        sudo ./build_linux.sh -u
    
    - name: Build dependencies
      shell: bash -e {0}
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"
        export MAKEFLAGS="-j$(nproc)"
        
        echo "Building dependencies with $(nproc) parallel jobs..."
        ./build_linux.sh -d
    
    - name: Build OrcaSlicer
      shell: bash -e {0}
      run: |
        export CC="ccache gcc"
        export CXX="ccache g++"
        export CMAKE_BUILD_PARALLEL_LEVEL=$(nproc)
        
        echo "Building OrcaSlicer with $(nproc) parallel jobs..."
        time ./build_linux.sh -s
    
    - name: Build AppImage
      shell: bash -e {0}
      run: |
        echo "Creating AppImage..."
        time ./build_linux.sh -i
    
    - name: Get version info
      id: version
      shell: bash -e {0}
      run: |
        set -o pipefail
        
        # 提取版本号
        VERSION=$(grep 'SoftFever_VERSION' version.inc | sed -n 's/.*"\(.*\)".*/\1/p' | head -n1)
        if [ -z "$VERSION" ]; then
          echo "Error: Failed to extract version from version.inc"
          exit 1
        fi
        
        # 查找 AppImage 文件
        APPIMAGE_PATH=$(find build -maxdepth 1 -name "OrcaSlicer*.AppImage" -type f | head -n1)
        if [ -z "$APPIMAGE_PATH" ]; then
          echo "Error: No AppImage found in build directory"
          ls -la build/ || true
          exit 1
        fi
        
        FILENAME=$(basename "$APPIMAGE_PATH")
        FILEPATH="build/${FILENAME}"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
        echo "filepath=${FILEPATH}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"
        echo "Filename: ${FILENAME}"
        echo "Filepath: ${FILEPATH}"
    
    - name: Verify AppImage
      shell: bash -e {0}
      run: |
        FILEPATH="${{ steps.version.outputs.filepath }}"
        
        if [ ! -f "$FILEPATH" ]; then
          echo "Error: AppImage file not found at: $FILEPATH"
          echo "Build directory contents:"
          ls -la build/ || true
          exit 1
        fi
        
        echo "✓ AppImage found: $FILEPATH"
        echo ""
        echo "File details:"
        ls -lh "$FILEPATH"
        echo ""
        echo "File type:"
        file "$FILEPATH"
        echo ""
        echo "✓ AppImage is ready for deployment to Ubuntu 24.04 x86_64 servers"
        
        # 显示编译统计
        if command -v ccache &> /dev/null; then
          echo ""
          echo "=== CCache Statistics ==="
          ccache -s
        fi
    
    - name: Upload AppImage as artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrcaSlicer-Ubuntu24.04-x86_64-${{ steps.version.outputs.version }}
        path: build/OrcaSlicer*.AppImage
        if-no-files-found: error
        retention-days: 30
        compression-level: 0  # AppImage 已经压缩，跳过额外压缩以节省时间
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ steps.version.outputs.filepath }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
