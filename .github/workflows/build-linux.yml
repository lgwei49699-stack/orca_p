name: Build Linux AppImage for x86_64

on:
  # 自动触发配置
  push:
    branches: 
      - 2.3.5_fix
      - feature/2.3.5_fix
      - main
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

  # 手动触发
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    # 使用 Ubuntu 24.04 匹配您的服务器环境
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Free up disk space
      shell: bash -e {0}
      run: |
        # 快速清理（去掉耗时的操作）
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo apt-get clean
    
    - name: Setup build info
      shell: bash -e {0}
      run: |
        echo "Building for Ubuntu 24.04 x86_64"
        uname -a
        cat /etc/os-release
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          deps/build
          deps/DL_CACHE
        key: ${{ runner.os }}-24.04-deps-osmesa-v3-${{ hashFiles('deps/CMakeLists.txt', 'deps/**/*.cmake', 'deps/**/CMakeLists.txt') }}
        # v3: 修复 GLFW_USE_OSMESA (之前用了错误的 GLFW_BUILD_OSMESA)
    
    - name: Cache ccache
      uses: actions/cache@v3
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-24.04-ccache-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-24.04-ccache-
    
    - name: Fix package manager state
      shell: bash -e {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-broken
        sudo apt-get install -y libunwind-dev libosmesa6-dev
    
    - name: Install system dependencies
      shell: bash -e {0}
      run: |
        # 安装 ccache 加速编译
        sudo apt-get install -y ccache
        sudo ./build_linux.sh -u
    
    - name: Build dependencies
      shell: bash -e {0}
      run: |
        ./build_linux.sh -d
    
    - name: Build OrcaSlicer
      shell: bash -e {0}
      run: |
        # 配置 ccache
        export PATH="/usr/lib/ccache:$PATH"
        export CCACHE_DIR=~/.ccache
        export CCACHE_MAXSIZE=2G
        ccache -z  # 重置统计
        
        # 使用多核编译（GitHub Actions 有 2 核）
        export CMAKE_BUILD_PARALLEL_LEVEL=2
        
        ./build_linux.sh -s
        
        # 显示 ccache 统计
        echo "=== ccache statistics ==="
        ccache -s
    
    - name: Build AppImage
      shell: bash -e {0}
      run: |
        ./build_linux.sh -i
    
    - name: Get version info
      id: version
      shell: bash -e {0}
      run: |
        set -o pipefail
        
        # 提取版本号
        VERSION=$(grep 'SoftFever_VERSION' version.inc | sed -n 's/.*"\(.*\)".*/\1/p' | head -n1)
        if [ -z "$VERSION" ]; then
          echo "Error: Failed to extract version from version.inc"
          exit 1
        fi
        
        # 查找 AppImage 文件（避免使用 xargs -r）
        APPIMAGE_PATH=$(find build -maxdepth 1 -name "OrcaSlicer*.AppImage" -type f | head -n1)
        if [ -z "$APPIMAGE_PATH" ]; then
          echo "Error: No AppImage found in build directory"
          ls -la build/ || true
          exit 1
        fi
        
        FILENAME=$(basename "$APPIMAGE_PATH")
        FILEPATH="build/${FILENAME}"
        
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
        echo "filepath=${FILEPATH}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION}"
        echo "Filename: ${FILENAME}"
        echo "Filepath: ${FILEPATH}"
    
    - name: Verify AppImage
      shell: bash -e {0}
      run: |
        FILEPATH="${{ steps.version.outputs.filepath }}"
        
        if [ ! -f "$FILEPATH" ]; then
          echo "Error: AppImage file not found at: $FILEPATH"
          echo "Build directory contents:"
          ls -la build/ || true
          exit 1
        fi
        
        echo "✓ AppImage found: $FILEPATH"
        echo ""
        echo "File details:"
        ls -lh "$FILEPATH"
        echo ""
        echo "File type:"
        file "$FILEPATH"
        echo ""
        echo "✓ AppImage is ready for deployment to Ubuntu 24.04 x86_64 servers"
    
    - name: Upload AppImage as artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrcaSlicer-Ubuntu24.04-x86_64-${{ steps.version.outputs.version }}
        path: build/OrcaSlicer*.AppImage
        if-no-files-found: error
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ steps.version.outputs.filepath }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
